name: Deploy dbt Project

# Controls when the action will run. 
on:
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0
        # removed use-oidc: true

      - name: Write private key to file
        run: |
          cat << 'EOF' > /tmp/rsa_key.p8
          ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          EOF
          chmod 600 /tmp/rsa_key.p8
          echo "--- First line ---"
          head -1 /tmp/rsa_key.p8
          echo "--- Last line ---"
          tail -1 /tmp/rsa_key.p8
          echo "--- Line count ---"
          wc -l /tmp/rsa_key.p8
                    
      - name: Create Snowflake connection config
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml <<EOF
          default_connection_name = "dev"
          
          [connections.dev]
          account = "$SNOWFLAKE_ACCOUNT"
          user = "$SNOWFLAKE_USER"
          private_key_path = "/tmp/rsa_key.p8"
          authenticator = "SNOWFLAKE_JWT"
          database = "$SNOWFLAKE_DATABASE"
          schema = "$SNOWFLAKE_SCHEMA"
          warehouse = "$SNOWFLAKE_WAREHOUSE"
          role = "$SNOWFLAKE_ROLE"
          EOF
          chmod 0600 ~/.snowflake/config.toml
          echo "--- config.toml contents ---"
          cat ~/.snowflake/config.toml

      - name: Test the Snowflake CLI connection
        run: snow connection test --connection dev

      - name: Create dbt profiles.yml
        run: |
          cat > ./tasty_bytes_demo/profiles.yml << EOF
          tasty_bytes_demo:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "$SNOWFLAKE_ACCOUNT"
                user: "$SNOWFLAKE_USER"
                private_key_path: "/tmp/rsa_key.p8"
                authenticator: jwt
                role: "$SNOWFLAKE_ROLE"
                database: "$SNOWFLAKE_DATABASE"
                warehouse: "$SNOWFLAKE_WAREHOUSE"
                schema: "$SNOWFLAKE_SCHEMA"
                threads: 4
          EOF

      - name: Deploy the dbt project
        run: snow dbt deploy DEMO_DBT_PROJECT --source ./tasty_bytes_demo --force --connection dev

      - name: List dbt projects
        run: snow dbt list --connection dev

      - name: Execute dbt run
        run: snow dbt execute DEMO_DBT_PROJECT run --target dev --select models/example/my_first_dbt_model.sql --connection dev

      - name: Execute dbt test
        run: snow dbt execute DEMO_DBT_PROJECT test --target dev --select tests/assert_my_first_dbt_model_row_count.sql --connection dev