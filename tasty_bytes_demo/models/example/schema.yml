
version: 2

models:
  - name: my_first_dbt_model
    description: "A starter dbt model"
    columns:
      - name: id
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null

  - name: my_second_dbt_model
    description: "A starter dbt model"
    columns:
      - name: id
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null

  - name: my_third_dbt_model
    description: "Demonstrates dbt_utils macros: generate_surrogate_key and safe_divide"
    data_tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('my_first_dbt_model')
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          max_value: 100
      - dbt_expectations.expect_table_columns_to_match_set:
          column_list: ["id", "surrogate_key", "id_divided_by_itself"]
    columns:
      - name: surrogate_key
        description: "Surrogate key generated by dbt_utils.generate_surrogate_key"
        data_tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9a-f]{32}$"
      - name: id_divided_by_itself
        description: "id / id via dbt_utils.safe_divide — returns 1 for non-null rows, null for null id"
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "= 1 or id_divided_by_itself is null"
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: [1]
              quote_values: false
              row_condition: "id_divided_by_itself is not null"
